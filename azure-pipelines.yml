# yaml-language-server: $schema=https://json.schemastore.org/azure-pipelines.json

trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  imageName: 'venkateshs111/springboot-hello-azure-devops'
  dockerRegistryServiceConnection: 'dockerhub-connection'
  jarName: 'springboot-hello-1.0.0.jar'
  imageTag: '$(Build.BuildId)'
  devContainerName: 'springboot-app-dev'
  qaContainerName: 'springboot-app-qa'
  prodContainerName: 'springboot-app-prod'
  devPort: '8080'
  qaPort: '8081'
  prodPort: '8082'

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: MavenBuild
    displayName: Maven Build
    steps:
    - checkout: self

    - task: Maven@3
      displayName: Build with Maven
      inputs:
        mavenPOMFile: 'pom.xml'
        goals: 'clean package'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.8'

    - task: CopyFiles@2
      displayName: Copy JAR
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/target'
        Contents: '$(jarName)'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: PublishPipelineArtifact@1
      displayName: Publish JAR Artifact
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'app-jar'
        publishLocation: 'pipeline'

- stage: Docker
  displayName: Docker Build And Push
  dependsOn: Build
  jobs:
  - job: DockerBuildPush
    displayName: Build And Push Docker Image
    steps:
    - checkout: self

    - task: DownloadPipelineArtifact@2
      displayName: Download JAR Artifact
      inputs:
        buildType: 'current'
        artifactName: 'app-jar'
        targetPath: '$(Pipeline.Workspace)/app-jar'

    - task: CopyFiles@2
      displayName: Restore JAR Into Docker Context
      inputs:
        SourceFolder: '$(Pipeline.Workspace)/app-jar'
        Contents: '$(jarName)'
        TargetFolder: '$(Build.SourcesDirectory)/target'

    - task: Docker@2
      displayName: Build And Push Docker Image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(imageTag)
          latest

- stage: Dev
  displayName: Deploy To Dev
  dependsOn: Docker
  jobs:
  - deployment: DeployDev
    displayName: Deploy Docker Image To Dev
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - powershell: |
              Write-Host "Deploying $(imageName):$(imageTag) to DEV"
              docker pull $(imageName):$(imageTag)

              docker rm -f $(devContainerName)
              if ($LASTEXITCODE -ne 0) {
                Write-Host "DEV container did not exist."
              }

              docker run -d -p $(devPort):8080 --name $(devContainerName) $(imageName):$(imageTag)
            displayName: Run DEV Container

- stage: QA
  displayName: Deploy To QA
  dependsOn: Dev
  jobs:
  - deployment: DeployQA
    displayName: Deploy Docker Image To QA
    environment: 'qa'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - powershell: |
              Write-Host "Deploying $(imageName):$(imageTag) to QA"
              docker pull $(imageName):$(imageTag)

              docker rm -f $(qaContainerName)
              if ($LASTEXITCODE -ne 0) {
                Write-Host "QA container did not exist."
              }

              docker run -d -p $(qaPort):8080 --name $(qaContainerName) $(imageName):$(imageTag)
            displayName: Run QA Container

- stage: ProdApproval
  displayName: Prod Approval
  dependsOn: QA
  jobs:
  - job: WaitForApproval
    displayName: Manual Validation Before Prod
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        instructions: 'Approve this step to deploy the current Docker image to PROD.'
        notifyUsers: ''
        onTimeout: 'reject'

- stage: Prod
  displayName: Deploy To Prod
  dependsOn: ProdApproval
  jobs:
  - deployment: DeployProd
    displayName: Deploy Docker Image To Prod
    environment: 'prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - powershell: |
              Write-Host "Deploying $(imageName):$(imageTag) to PROD"
              docker pull $(imageName):$(imageTag)

              docker rm -f $(prodContainerName)
              if ($LASTEXITCODE -ne 0) {
                Write-Host "PROD container did not exist."
              }

              docker run -d -p $(prodPort):8080 --name $(prodContainerName) $(imageName):$(imageTag)
            displayName: Run PROD Container
